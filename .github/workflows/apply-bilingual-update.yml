name: Apply bilingual site update

on:
  push:
    branches: [master]
    paths:
      - ".site-update/READY"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct verified update
        run: |
          cat .site-update/chunk-* | tr -d '\n' | xxd -r -p > /tmp/dragon-bilingual-update.tar.gz
         