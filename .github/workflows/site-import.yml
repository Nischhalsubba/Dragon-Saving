name: Import verified site bundle

on:
  push:
    branches: [master]
    paths:
      - ".site-import/READY"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct verified bundle
        run: |
          cat .site-import/chunk-* > /tmp/dragon-site.b64
          cat .site-import/encoded-* | base64 --decode >> /tmp/dragon-site.b64
          base64 --decode /tmp/dragon-site.b64 > /tmp/dragon-site.tar.gz
          tar -xzf /tmp/dragon-site.tar.gz -C .
          rm -rf .site-import

      - name: Commit verified implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement first-time customer experience and full audit tooling"
          git push origin master
